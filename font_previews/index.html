<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文字体预览</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .stats {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 100%;
            height: auto;
            display: block;
        }
        .card .info {
            padding: 15px;
        }
        .card .font-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .card .font-path {
            font-size: 12px;
            color: #888;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>中文字体预览</h1>
    <div class="stats">
        <p>共 2 个字体文件 | 成功生成 2 张预览图</p>
    </div>
    <div class="grid">
        <div class="card">
            <a href="GenRyuMinTW-Regular_384e89.png" target="_blank">
                <img src="GenRyuMinTW-Regular_384e89.png" alt="GenRyuMinTW-Regular" loading="lazy">
            </a>
            <div class="info">
                <div class="font-name">GenRyuMinTW-Regular</div>
                <div class="font-path">ButTaiwan-源樣體/GenRyuMinTW-Regular.ttf</div>
            </div>
        </div>
        <div class="card">
            <a href="GenYoGothicTW-Regular_996958.png" target="_blank">
                <img src="GenYoGothicTW-Regular_996958.png" alt="GenYoGothicTW-Regular" loading="lazy">
            </a>
            <div class="info">
                <div class="font-name">GenYoGothicTW-Regular</div>
                <div class="font-path">ButTaiwan-源樣體/GenYoGothicTW-Regular.ttf</div>
            </div>
        </div>
    </div>
</body>
</html>
